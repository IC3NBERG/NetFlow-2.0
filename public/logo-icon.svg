<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="200" x2="200" y2="0">
      <stop offset="0%" stop-color="#5B4BD5"/>
      <stop offset="100%" stop-color="#8B7CF7"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Network nodes and connections -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Connections -->
    <line x1="60" y1="55" x2="95" y2="40"/>
    <line x1="95" y1="40" x2="140" y2="65"/>
    <line x1="60" y1="55" x2="45" y2="100"/>
    <line x1="45" y1="100" x2="80" y2="140"/>
    <line x1="80" y1="140" x2="130" y2="155"/>
    <line x1="130" y1="155" x2="155" y2="120"/>
    <line x1="140" y1="65" x2="155" y2="120"/>
    <line x1="95" y1="40" x2="110" y2="90"/>
    <line x1="80" y1="140" x2="110" y2="90"/>
  </g>
  <!-- Network nodes (filled circles) -->
  <g fill="#fff">
    <circle cx="60" cy="55" r="7"/>
    <circle cx="95" cy="40" r="7"/>
    <circle cx="140" cy="65" r="7"/>
    <circle cx="45" cy="100" r="7"/>
    <circle cx="110" cy="90" r="7"/>
    <circle cx="155" cy="120" r="7"/>
    <circle cx="80" cy="140" r="7"/>
    <circle cx="130" cy="155" r="7"/>
  </g>
  <!-- Wavy lines flowing diagonally -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M35 170 C55 150, 75 130, 95 110 C115 90, 135 70, 165 45"/>
    <path d="M25 175 C45 155, 65 135, 85 115 C105 95, 125 75, 155 50"/>
    <path d="M45 180 C65 160, 85 140, 105 120 C125 100, 145 80, 175 55"/>
    <path d="M30 160 C50 140, 70 120, 90 100 C110 80, 130 60, 160 35"/>
    <path d="M40 165 C60 145, 80 125, 100 105 C120 85, 140 65, 170 40"/>
  </g>
</svg>
